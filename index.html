<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Müşteri Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background-color: #f4f7f6; }
        .main-container { max-width: 1000px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .search-section { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        input[type="text"] { padding: 12px; width: 60%; border-radius: 8px; border: 1px solid #ddd; }
        button.sorgula-btn { padding: 12px 25px; background-color: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .action-btn { border: none; padding: 10px 15px; cursor: pointer; border-radius: 6px; font-weight: bold; color: white; text-decoration: none; font-size: 13px; display: inline-flex; align-items: center; }
        .excel-btn { background-color: #217346; }
        .pdf-btn { background-color: #d32f2f; }
        .detay-btn { background-color: #007bff; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { padding: 12px 15px; border-bottom: 1px solid #eee; text-align: left; }
        th { background-color: #f8f9fa; width: 30%; }
        td.bakiye-cell { font-size: 18px; white-space: nowrap; }
        #haritaAlani { height: 400px; margin-top: 20px; border-radius: 12px; display: none; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="main-container">
    <h1 style="text-align:center; color:#007bff;">Müşteri Portal</h1>
    <div class="search-section">
        <input type="text" id="musteriKodu" placeholder="Müşteri Kodu veya Adı..." onkeypress="if(event.keyCode == 13) sorgula()">
        <button onclick="sorgula()" class="sorgula-btn">SORGULA</button>
    </div>
    <div id="sonucAlani"></div>
    <div id="haritaAlani"></div>
</div>

<script>
    const veriDosyasiURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRkONEBGWF-u3K_tU6kNvsHUpO9LUx_ZDUCvy_SCCcjWh0K7jnmGeynwM9XAUwwww/pub?output=csv';
    let tumMusteriler = [];
    let harita = null;

    Papa.parse(veriDosyasiURL, {
        download: true, header: true,
        complete: function(results) { tumMusteriler = results.data; }
    });

    function sorgula() {
        const input = document.getElementById('musteriKodu').value.trim().toUpperCase();
        const sonuclar = tumMusteriler.filter(m => String(m['Müşteri Kodu']).includes(input) || String(m['Müşteri Adı']).toUpperCase().includes(input));
        
        if (sonuclar.length === 1) {
            detayGoster(sonuclar[0]);
        } else if (sonuclar.length > 1) {
            let listHtml = `<ul style="list-style:none; padding:0;">`;
            sonuclar.forEach(m => {
                listHtml += `<li style="padding:10px; border:1px solid #eee; margin-bottom:5px; cursor:pointer; border-radius:8px;" onclick="hizliSec('${m['Müşteri Kodu']}')">📌 ${m['Müşteri Kodu']} - ${m['Müşteri Adı']}</li>`;
            });
            document.getElementById('sonucAlani').innerHTML = listHtml + '</ul>';
        }
    }

    function hizliSec(kod) { document.getElementById('musteriKodu').value = kod; sorgula(); }

    function detayGoster(m) {
        const mKodu = m['Müşteri Kodu'];
        const lat = parseFloat(String(m['Enlem']).replace(',', '.'));
        const lon = parseFloat(String(m['Boylam']).replace(',', '.'));
        
        // --- Eksi Değer Uyumlu Bakiye İşleme ---
        let hamVeri = String(m['Bakiye']).replace(/\s/g, ''); // Boşlukları sil
        
        // Önce binlik ayracı olan noktayı kaldırıyoruz, sonra virgulü noktaya çeviriyoruz
        let temizSayı = hamVeri.replace(/\./g, '').replace(',', '.');
        let sayisalBakiye = parseFloat(temizSayı);
        
        let formatliBakiye;
        if (!isNaN(sayisalBakiye)) {
            formatliBakiye = sayisalBakiye.toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " TL";
        } else {
            formatliBakiye = m['Bakiye'] + " TL"; 
        }

        document.getElementById('sonucAlani').innerHTML = `
            <table>
                <tr>
                    <th>Raporlar</th>
                    <td>
                        <div class="btn-group">
                            <button onclick="ekstreIndir('${mKodu}', 'ExportToExcel')" class="action-btn excel-btn">📊 Ekstre Excel</button>
                            <button onclick="ekstreIndir('${mKodu}', 'ExportToPDF')" class="action-btn pdf-btn">📄 Ekstre PDF</button>
                            <button onclick="ozelDetayGor('${mKodu}')" class="action-btn detay-btn">🔍 Detay Gör</button>
                        </div>
                    </td>
                </tr>
                <tr><th>Müşteri</th><td><b>${mKodu} - ${m['Müşteri Adı']}</b></td></tr>
                <tr><th>Bakiye</th><td class="bakiye-cell"><b style="color:${sayisalBakiye > 0 ? 'red' : 'green'}">${formatliBakiye}</b></td></tr>
            </table>`;
        
        if (!isNaN(lat) && lat !== 0) {
            document.getElementById('haritaAlani').style.display = 'block';
            if (harita) harita.remove();
            harita = L.map('haritaAlani').setView([lat, lon], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(harita);
            L.marker([lat, lon]).addTo(harita).bindPopup(m['Müşteri Adı']).openPopup();
        }
    }

    function ekstreIndir(kod, mod) {
        const url = `https://vp.golfdondurma.com.tr/SAASReport/ReportView.aspx?reportId=31885200&ReportTypeId=2&filters=0;134000428026|2;${kod}|1;161|3;01.01.2026|4;31.12.2026|5;|6;|7;&RoleId=134053451661&LanguageId=1&UserId=134053530632&Mode=${mod}&Token=83b27236-1b41-4ea7-84fb-95467bee94a0`;
        window.open(url, '_blank');
    }

    function ozelDetayGor(kod) {
        const url = `https://vp.golfdondurma.com.tr/SAASReport/ReportView.aspx?CubeReportId=350012883&Values=0;TO_DATE(\`20260101\`,\`YYYYMMDD\`)|1;TO_DATE(\`20261231\`,\`YYYYMMDD\`)|2;134000428026|13;|14;|15;|6;|10;\`${kod}\`|19;(-1,1927425,597953372,964276816,102319271251,103567574790)|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;|;&RoleId=134053451661&LanguageId=1&UserId=134053530632&ReportTypeId=1&RW=350012895,350012886,350012896,104201257687,104201257688,350012887,350012888&CL=&DT=133015712793,350012899&Mode=ExportToPDF&Token=e848a86f-4f25-4077-8d85-f864885d0c04`;
        window.open(url, '_blank');
    }
</script>
</body>
</html>
